<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraMINA - Controle de Abastecimento</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #0e1015;
  --bg2: #151820;
  --card: #1a1e28;
  --card2: #222630;
  --border: #2a2f3a;
  --border2: #363c4a;
  --red: #e53e3e;
  --orange: #ed8936;
  --yellow: #ecc94b;
  --teal: #38b2ac;
  --green: #48bb78;
  --text: #e8ebf0;
  --muted: #5f6577;
  --glass: rgba(26, 30, 40, 0.94);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.mono { font-family: 'JetBrains Mono', monospace; }

.login-screen { 
  min-height: 100vh; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  padding: 20px;
  background: linear-gradient(135deg, #0e1015 0%, #1a1e28 100%);
  position: relative;
  overflow: hidden;
}

.login-screen::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 600px;
  height: 600px;
  opacity: 0.08;
  pointer-events: none;
}

.login-box { 
  width: 100%; 
  max-width: 420px;
  position: relative;
  z-index: 10;
}

.login-logo-container {
  text-align: center;
  margin-bottom: 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

.login-logo-img {
  width: 120px;
  height: 120px;
  object-fit: contain;
  filter: drop-shadow(0 0 20px rgba(220, 38, 38, 0.3));
}

.login-title {
  font-size: 48px;
  font-weight: 900;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #fff;
  line-height: 1;
}

.login-sub {
  text-align: center;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--orange);
  margin-top: 8px;
}

.login-card { 
  background: var(--card); 
  border: 1px solid var(--border); 
  border-radius: 12px; 
  padding: 24px;
  margin-top: 24px;
}

.login-link { 
  text-align: center; 
  margin-top: 16px; 
  font-size: 11px; 
  color: var(--muted); 
}

.login-link button { 
  background: none; 
  border: none; 
  color: var(--orange); 
  font-weight: 600; 
  cursor: pointer; 
  font-family: inherit; 
  font-size: 11px; 
}

.sidebar { 
  position: fixed; 
  left: 0; 
  top: 0; 
  bottom: 0; 
  width: 230px; 
  background: var(--bg2); 
  border-right: 1px solid var(--border); 
  z-index: 50; 
  display: flex; 
  flex-direction: column; 
  transition: transform 0.25s; 
}

.sb-head { 
  padding: 20px 16px; 
  border-bottom: 1px solid var(--border); 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  gap: 12px; 
}

.sb-logo { 
  width: 70px; 
  height: 70px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  overflow: hidden;
}

.sb-logo-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.sb-name { 
  font-weight: 900; 
  color: #fff; 
  font-size: 14px; 
  letter-spacing: 2px; 
  text-transform: uppercase; 
  text-align: center; 
}

.nav-item { 
  display: flex; 
  align-items: center; 
  gap: 10px; 
  padding: 9px 16px; 
  cursor: pointer; 
  color: var(--muted); 
  transition: all 0.15s; 
  border-left: 3px solid transparent; 
  font-size: 12.5px; 
  font-weight: 500; 
}

.nav-item:hover { 
  color: var(--text); 
  background: rgba(237, 137, 54, 0.03); 
}

.nav-item.active { 
  color: var(--orange); 
  background: rgba(237, 137, 54, 0.06); 
  border-left-color: var(--orange); 
}

.sb-foot { 
  padding: 12px; 
  border-top: 1px solid var(--border); 
  margin-top: auto; 
}

.sb-logout { 
  width: 100%; 
  padding: 6px 0; 
  border: none; 
  background: none; 
  color: var(--muted); 
  font-size: 11px; 
  cursor: pointer; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  gap: 6px; 
  border-radius: 6px; 
  transition: all 0.15s; 
}

.sb-logout:hover { 
  background: var(--card); 
  color: var(--red); 
}

.main-content { 
  margin-left: 230px; 
  min-height: 100vh; 
}

.top-bar { 
  position: sticky; 
  top: 0; 
  z-index: 40; 
  background: var(--glass); 
  backdrop-filter: blur(16px); 
  border-bottom: 1px solid var(--border); 
  padding: 12px 22px; 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
}

.top-bar h1 { 
  font-size: 13px; 
  font-weight: 700; 
}

.card { 
  background: var(--card); 
  border: 1px solid var(--border); 
  border-radius: 8px; 
  padding: 16px; 
  margin-bottom: 16px; 
}

.badge { 
  display: inline-flex; 
  align-items: center; 
  padding: 2px 8px; 
  border-radius: 10px; 
  font-size: 9px; 
  font-weight: 700; 
  text-transform: uppercase; 
}

.badge-active { 
  background: rgba(72, 187, 120, 0.1); 
  color: var(--green); 
}

.badge-ausente { 
  background: rgba(229, 62, 62, 0.1); 
  color: var(--red); 
}

.badge-ferias { 
  background: rgba(236, 201, 75, 0.1); 
  color: var(--yellow); 
}

.btn { 
  display: inline-flex; 
  align-items: center; 
  gap: 6px; 
  padding: 7px 14px; 
  border-radius: 6px; 
  font-size: 11px; 
  font-weight: 600; 
  cursor: pointer; 
  border: none; 
  transition: all 0.15s; 
  font-family: inherit; 
}

.btn-primary { 
  background: linear-gradient(135deg, var(--orange), #dd6b20); 
  color: #fff; 
}

.btn-primary:hover { 
  box-shadow: 0 3px 10px rgba(237, 137, 54, 0.2); 
}

.btn-secondary { 
  background: var(--card2); 
  color: var(--text); 
  border: 1px solid var(--border); 
}

.btn-secondary:hover { 
  border-color: var(--orange); 
}

.btn-danger { 
  background: rgba(229, 62, 62, 0.1); 
  color: var(--red); 
  border: 1px solid rgba(229, 62, 62, 0.2); 
}

.btn-danger:hover { 
  background: rgba(229, 62, 62, 0.2); 
}

.btn-sm { 
  padding: 4px 9px; 
  font-size: 10px; 
}

.input { 
  background: var(--bg); 
  border: 1px solid var(--border); 
  border-radius: 6px; 
  padding: 8px 11px; 
  color: var(--text); 
  font-size: 11.5px; 
  width: 100%; 
  transition: border-color 0.15s; 
}

.input:focus { 
  outline: none; 
  border-color: var(--orange); 
  box-shadow: 0 0 0 2px rgba(237, 137, 54, 0.1); 
}

select.input { 
  cursor: pointer; 
}

.section { 
  display: none; 
  padding: 20px 22px; 
}

.section.active { 
  display: block; 
}

.password-wrapper { 
  position: relative; 
}

.password-toggle { 
  position: absolute; 
  right: 10px; 
  top: 50%; 
  transform: translateY(-50%); 
  background: none; 
  border: none; 
  color: var(--muted); 
  cursor: pointer; 
  padding: 5px; 
  font-size: 12px; 
}

.password-toggle:hover { 
  color: var(--orange); 
}

.toast-container { 
  position: fixed; 
  top: 14px; 
  right: 14px; 
  z-index: 9999; 
  display: flex; 
  flex-direction: column; 
  gap: 5px; 
}

.toast { 
  display: flex; 
  align-items: center; 
  gap: 7px; 
  padding: 9px 14px; 
  border-radius: 7px; 
  background: var(--card); 
  border: 1px solid var(--border); 
  transform: translateX(110%); 
  transition: transform 0.25s; 
  font-size: 11px; 
}

.toast.show { 
  transform: translateX(0); 
}

.modal-overlay { 
  position: fixed; 
  inset: 0; 
  background: rgba(0, 0, 0, 0.5); 
  backdrop-filter: blur(3px); 
  z-index: 100; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  opacity: 0; 
  pointer-events: none; 
  transition: opacity 0.2s; 
}

.modal-overlay.show { 
  opacity: 1; 
  pointer-events: all; 
}

.modal { 
  background: var(--card); 
  border: 1px solid var(--border); 
  border-radius: 10px; 
  width: 92%; 
  max-width: 600px; 
  max-height: 85vh; 
  overflow-y: auto; 
  transform: scale(0.96); 
  transition: transform 0.2s; 
}

.modal-overlay.show .modal { 
  transform: scale(1); 
}

.modal-head { 
  padding: 14px 18px; 
  border-bottom: 1px solid var(--border); 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
}

.modal-head h3 { 
  font-size: 13px; 
  font-weight: 600; 
}

.modal-body { 
  padding: 18px; 
}

.modal-foot { 
  padding: 10px 18px; 
  border-top: 1px solid var(--border); 
  display: flex; 
  justify-content: flex-end; 
  gap: 6px; 
}

.table-responsive { 
  overflow-x: auto; 
  border-radius: 6px; 
  border: 1px solid var(--border); 
  margin-bottom: 12px; 
}

.table-responsive table { 
  width: 100%; 
  border-collapse: collapse; 
  font-size: 11px; 
}

.table-responsive th { 
  background: var(--bg2); 
  padding: 10px; 
  text-align: left; 
  font-weight: 600; 
  color: var(--muted); 
  font-size: 9px; 
  text-transform: uppercase; 
}

.table-responsive td { 
  padding: 10px; 
  border-top: 1px solid var(--border); 
}

.table-responsive tr:hover td { 
  background: rgba(237, 137, 54, 0.015); 
}

.stat-box { 
  background: var(--card2); 
  border: 1px solid var(--border); 
  border-radius: 8px; 
  padding: 12px; 
  text-align: center; 
}

.stat-value { 
  font-size: 24px; 
  font-weight: 900; 
  color: var(--orange); 
  margin-bottom: 4px; 
}

.stat-label { 
  font-size: 10px; 
  color: var(--muted); 
  text-transform: uppercase; 
}

.tabs { 
  display: flex; 
  gap: 2px; 
  margin-bottom: 16px; 
  border-bottom: 1px solid var(--border); 
}

.tab { 
  padding: 8px 16px; 
  cursor: pointer; 
  border: none; 
  background: none; 
  color: var(--muted); 
  font-size: 11px; 
  font-weight: 600; 
  border-bottom: 2px solid transparent; 
  transition: all 0.15s; 
  font-family: inherit; 
}

.tab:hover { 
  color: var(--text); 
}

.tab.active { 
  color: var(--orange); 
  border-bottom-color: var(--orange); 
}

.tab-content { 
  display: none; 
}

.tab-content.active { 
  display: block; 
}

.checkbox-group { 
  background: var(--card2); 
  border: 1px solid var(--border); 
  border-radius: 6px; 
  padding: 12px; 
  margin-bottom: 12px; 
}

.checkbox-item { 
  display: flex; 
  align-items: center; 
  gap: 8px; 
  padding: 6px 0; 
  font-size: 11px; 
}

.checkbox-item input { 
  cursor: pointer; 
  width: 16px; 
  height: 16px; 
}

.empty-state { 
  text-align: center; 
  padding: 40px 20px; 
}

.empty-state i { 
  font-size: 48px; 
  color: var(--muted); 
  margin-bottom: 12px; 
  display: block; 
  opacity: 0.5; 
}

.empty-state p { 
  font-size: 12px; 
  color: var(--muted); 
  margin-bottom: 8px; 
}

.empty-state a { 
  color: var(--orange); 
  font-weight: 600; 
  text-decoration: none; 
  cursor: pointer; 
}

@media (max-width: 768px) {
  .sidebar { 
    transform: translateX(-100%); 
  }
  
  .main-content { 
    margin-left: 0; 
  }
  
  .login-title {
    font-size: 36px;
  }
  
  .modal { 
    max-width: 95%; 
  }
}
</style>
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<div id="modalOverlay" class="modal-overlay" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle"></h3>
      <button onclick="closeModal()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0;">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-logo-container">
      <img src="assets/images.jpg" class="login-logo-img" alt="InfraMINA Logo">
      
      <div class="login-title">INFRAMINA</div>
      <div class="login-sub">Sistema de Controle</div>
    </div>

    <div class="login-card">
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div>
          <label for="loginUser" style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px;">Usuário</label>
          <input id="loginUser" class="input" placeholder="">
        </div>
        <div>
          <label for="loginPass" style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px;">Senha</label>
          <div class="password-wrapper">
            <input id="loginPass" type="password" class="input" placeholder="" style="padding-right:35px;">
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('loginPass', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <button onclick="doLogin()" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:10px;">
          <i class="fas fa-arrow-right-to-bracket"></i>Entrar
        </button>
      </div>
      <div id="loginError" style="background:rgba(229,62,62,0.1);border:1px solid rgba(229,62,62,0.2);color:var(--red);padding:8px 10px;border-radius:6px;font-size:10px;display:none;margin-top:12px;"></div>
    </div>
    <div class="login-link">Não tem conta? <button onclick="openRegisterModal()">Criar Conta</button></div>
  </div>
</div>

<!-- APP -->
<div id="mainApp" style="display:none;">
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <div class="sb-logo">
        <img src="assets/images.jpg" class="sb-logo-img" alt="InfraMINA">
      </div>
      <div class="sb-name">INFRAMINA</div>
    </div>
    <div style="flex:1;padding:6px 0;overflow-y:auto;" id="navList"></div>
    <div class="sb-foot">
      <button class="sb-logout" onclick="doLogout()">
        <i class="fas fa-right-from-bracket"></i>Sair
      </button>
    </div>
  </aside>
  <div class="main-content">
    <div class="top-bar">
      <h1 id="pageTitle">Dashboard</h1>
      <span class="mono" id="clock" style="font-size:10px;color:var(--muted);">--:--:--</span>
    </div>
    <div id="secDashboard" class="section active"></div>
    <div id="secCombois" class="section"></div>
    <div id="secSubsolo" class="section"></div>
    <div id="secExcel" class="section"></div>
    <div id="secRelatorios" class="section"></div>
    <div id="secTurno" class="section"></div>
  </div>
</div>

<script>
const K = { U: 'im_users', S: 'im_session', D: 'im_data', RT: 'im_relatorio_turno' };
let currentUser = null;
let excelData = null;
let excelMapeamento = {};
let relatorioTurnoAtual = null;

// ===== STORAGE =====
function getU() {
  const stored = localStorage.getItem(K.U);
  if (stored) return JSON.parse(stored);
  return [{
    id: 'admin_0',
    nome: 'Administrador',
    username: 'admin',
    password: 'admin',
    email: 'admin@inframina.com',
    role: 'Admin',
    status: 'ativo',
    criadoEm: new Date().toISOString()
  }];
}

function saveU(u) { localStorage.setItem(K.U, JSON.stringify(u)); }

function getData() {
  const stored = localStorage.getItem(K.D);
  if (stored) return JSON.parse(stored);
  return { combois: [], subsolo: [] };
}

function saveData(d) { localStorage.setItem(K.D, JSON.stringify(d)); }

function getSess() {
  const stored = localStorage.getItem(K.S);
  return stored ? JSON.parse(stored) : null;
}

function saveSess(s) { localStorage.setItem(K.S, JSON.stringify(s)); }

function getRelatoriosTurno() {
  const stored = localStorage.getItem(K.RT);
  if (stored) return JSON.parse(stored);
  return [];
}

function salvarRelatorioTurno(relatorio) {
  const relatorios = getRelatoriosTurno();
  const index = relatorios.findIndex(r => r.id === relatorio.id);
  if (index >= 0) {
    relatorios[index] = relatorio;
  } else {
    relatorios.push(relatorio);
  }
  localStorage.setItem(K.RT, JSON.stringify(relatorios));
}

// ===== UI =====
function togglePasswordVisibility(inputId, button) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    button.querySelector('i').className = 'fas fa-eye-slash';
  } else {
    input.type = 'password';
    button.querySelector('i').className = 'fas fa-eye';
  }
}

function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  const icons = { success: 'check-circle', error: 'exclamation-circle', info: 'info-circle' };
  const colors = { success: 'var(--green)', error: 'var(--red)', info: 'var(--teal)' };
  el.className = `toast`;
  el.innerHTML = `<i class="fas fa-${icons[type]}" style="color:${colors[type]};"></i><span>${msg}</span>`;
  container.appendChild(el);
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, 2800);
}

function openModal(title, body, footer) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFoot').innerHTML = footer || '';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// ===== AUTH =====
function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errorEl = document.getElementById('loginError');
  errorEl.style.display = 'none';
  
  if (!username || !password) {
    errorEl.textContent = '❌ Preencha usuário e senha';
    errorEl.style.display = 'block';
    return;
  }
  
  const users = getU();
  const user = users.find(u => u.username === username);
  
  if (!user) {
    errorEl.textContent = '❌ Usuário não encontrado';
    errorEl.style.display = 'block';
    return;
  }
  
  if (user.password !== password) {
    errorEl.textContent = '❌ Senha incorreta';
    errorEl.style.display = 'block';
    return;
  }
  
  if (user.status !== 'ativo') {
    errorEl.textContent = '❌ Conta inativa';
    errorEl.style.display = 'block';
    return;
  }
  
  currentUser = user;
  saveSess({ uid: user.id });
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  buildNav();
  renderDashboard();
  startClock();
  toast(`✓ Bem-vindo, ${user.nome}!`, 'success');
}

function doLogout() {
  currentUser = null;
  localStorage.removeItem(K.S);
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginPass').type = 'password';
  toast('Desconectado', 'info');
}

function autoLogin() {
  const sess = getSess();
  if (!sess) return;
  const users = getU();
  const user = users.find(u => u.id === sess.uid);
  if (user && user.status === 'ativo') {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    buildNav();
    renderDashboard();
    startClock();
  }
}

// ===== NAV =====
function buildNav() {
  const navList = document.getElementById('navList');
  navList.innerHTML = `
    <div class="nav-item active" onclick="navTo('secDashboard')">

function navTo(secId) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(secId).classList.add('active');
  event.currentTarget?.classList.add('active');
  
  const titles = {
    'secDashboard': 'Dashboard Operacional',
    'secCombois': 'Comboios de Abastecimento',
    'secSubsolo': 'Equipe de Subsolo',
    'secTurno': 'Relatório de Turno',
    'secExcel': 'Importar Dados',
    'secRelatorios': 'Relatórios'
  };
  document.getElementById('pageTitle').textContent = titles[secId];
  
  if (secId === 'secDashboard') renderDashboard();
  else if (secId === 'secCombois') renderCombois();
  else if (secId === 'secSubsolo') renderSubsolo();
  else if (secId === 'secTurno') renderTurno();
  else if (secId === 'secExcel') renderExcel();
  else if (secId === 'secRelatorios') renderRelatorios();
}

// ===== RELATÓRIO DE TURNO =====
function renderTurno() {

          <div class="stat-value" style="font-size:20px;">${relHoje.mecanica?.pessoal || 0}</div>
        </div>

function novoRelatorioTurno() {
  relatorioTurnoAtual = {

    turma: 'A',
    turno: '1',
    npe: '00:45hs',
    eletrica: { pessoal: 5, atividades: [] },
    mecanica: { pessoal: 9, atividades: [] },
    apoio: { atividades: [] },
    caldeiraria: { atividades: [] },
    contingente: { mecanica: [], eletrica: [], apoio: [], caldeiraria: [] },
    equipamentos: [],
    criadoEm: new Date().toISOString(),
    atualizadoEm: new Date().toISOString()
  };
  
  abrirEditorTurno();
}

function editarRelatorioTurno() {
  const relatorios = getRelatoriosTurno();
  const hoje = new Date().toISOString().split('T')[0];

function switchTabTurno(e, tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  e.target.closest('.tab').classList.add('active');
}

function addPessoalCont(tipo) {
  const nome = prompt('Nome do ' + (tipo === 'mecanica' ? 'mecânico' : 'eletricista') + ':');
  if (!nome) return;
  const status = prompt('Status (Presente/Ausente/Férias):');
  if (!status) return;
  
  relatorioTurnoAtual.contingente[tipo].push({ nome, status });
  editarRelatorioTurno();
}

function rmPessoalCont(tipo, i) {
  relatorioTurnoAtual.contingente[tipo].splice(i, 1);
  editarRelatorioTurno();
}

function addEquipamento() {
  const nome = prompt('Nome do equipamento:');
  if (!nome) return;
  const localizacao = prompt('Localização:');
  if (!localizacao) return;
  const status = prompt('Status (Liberado/Parado/Reforma):');
  if (!status) return;
  
  relatorioTurnoAtual.equipamentos.push({ nome, localizacao, status });
  editarRelatorioTurno();
}

function rmEquipamento(i) {
  relatorioTurnoAtual.equipamentos.splice(i, 1);
  editarRelatorioTurno();
}

function salvarRelatorioTurnoFunc() {
  relatorioTurnoAtual.turma = document.getElementById('rtTurma').value;
  relatorioTurnoAtual.turno = document.getElementById('rtTurno').value;
  relatorioTurnoAtual.npe = document.getElementById('rtNPE').value;
  relatorioTurnoAtual.data = document.getElementById('rtData').value;
  relatorioTurnoAtual.mecanica.pessoal = parseInt(document.getElementById('rtMecPessoal').value || 0);
  relatorioTurnoAtual.eletrica.pessoal = parseInt(document.getElementById('rtEletPessoal').value || 0);
  relatorioTurnoAtual.atualizadoEm = new Date().toISOString();
  
  salvarRelatorioTurno(relatorioTurnoAtual);
  closeModal();
  toast('✓ Relatório salvo com sucesso!', 'success');
  renderTurno();
}
