<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraMINA - Sistema de Controle</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #0e1015;
  --bg2: #151820;
  --card: #1a1e28;
  --card2: #222630;
  --border: #2a2f3a;
  --border2: #363c4a;
  --red: #e53e3e;
  --orange: #ed8936;
  --yellow: #ecc94b;
  --redg: rgba(229, 62, 62, 0.1);
  --orangeg: rgba(237, 137, 54, 0.1);
  --teal: #38b2ac;
  --green: #48bb78;
  --text: #e8ebf0;
  --muted: #5f6577;
  --glass: rgba(26, 30, 40, 0.94);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.mono { font-family: 'JetBrains Mono', monospace; }

.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-box { width: 100%; max-width: 340px; }
.login-logo { text-align: center; margin-bottom: 20px; height: 50px; }
.login-logo img { height: 100%; width: auto; object-fit: contain; }
.login-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
.login-title { text-align: center; margin-bottom: 4px; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.login-sub { text-align: center; margin-bottom: 24px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--border2); }
.login-link { text-align: center; margin-top: 16px; font-size: 11px; color: var(--muted); }
.login-link button { background: none; border: none; color: var(--orange); font-weight: 600; cursor: pointer; font-family: inherit; font-size: 11px; transition: all 0.15s; }
.login-link button:hover { text-decoration: underline; color: #ff9944; }

.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 230px; background: var(--bg2); border-right: 1px solid var(--border); z-index: 50; display: flex; flex-direction: column; transition: transform 0.25s; }
.sb-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.sb-head img { height: 30px; width: auto; object-fit: contain; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; color: var(--muted); transition: all 0.15s; border-left: 3px solid transparent; font-size: 12.5px; font-weight: 500; user-select: none; }
.nav-item:hover { color: var(--text); background: rgba(237, 137, 54, 0.03); }
.nav-item.active { color: var(--orange); background: rgba(237, 137, 54, 0.06); border-left-color: var(--orange); }
.sb-foot { padding: 12px; border-top: 1px solid var(--border); margin-top: auto; }
.sb-logout { width: 100%; padding: 6px 0; border: none; background: none; color: var(--muted); font-size: 11px; font-family: inherit; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; border-radius: 6px; transition: all 0.15s; }
.sb-logout:hover { background: var(--card); color: var(--red); }

.main-content { margin-left: 230px; min-height: 100vh; position: relative; z-index: 1; }
.top-bar { position: sticky; top: 0; z-index: 40; background: var(--glass); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 10px 22px; display: flex; align-items: center; justify-content: space-between; }
.top-bar h1 { font-size: 13px; font-weight: 700; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 10px; font-size: 9px; font-weight: 700; text-transform: uppercase; }
.badge-active { background: rgba(72, 187, 120, 0.1); color: var(--green); }
.badge-orange { background: var(--orangeg); color: var(--orange); }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
.btn-primary { background: linear-gradient(135deg, var(--orange), #dd6b20); color: #fff; }
.btn-primary:hover { box-shadow: 0 3px 10px rgba(237, 137, 54, 0.2); }
.btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--orange); color: var(--orange); }
.btn-danger { background: var(--redg); color: var(--red); border: 1px solid rgba(229, 62, 62, 0.15); }
.btn-danger:hover { background: rgba(229, 62, 62, 0.18); }
.btn-sm { padding: 4px 9px; font-size: 10px; }

.input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 11px; color: var(--text); font-size: 11.5px; font-family: inherit; width: 100%; transition: border-color 0.15s; }
.input:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 2px rgba(237, 137, 54, 0.1); }

.section { display: none; padding: 20px 22px; }
.section.active { display: block; }

.password-wrapper { position: relative; width: 100%; }
.password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; padding: 5px; transition: color 0.15s; font-size: 12px; }
.password-toggle:hover { color: var(--orange); }

.toast-container { position: fixed; top: 14px; right: 14px; z-index: 9999; display: flex; flex-direction: column; gap: 5px; }
.toast { display: flex; align-items: center; gap: 7px; padding: 9px 14px; border-radius: 7px; background: var(--card); border: 1px solid var(--border); box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35); transform: translateX(110%); transition: transform 0.25s; font-size: 11px; }
.toast.show { transform: translateX(0); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(3px); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 10px; width: 92%; max-width: 480px; max-height: 80vh; overflow-y: auto; transform: scale(0.96); transition: transform 0.2s; box-shadow: 0 20px 25px rgba(0, 0, 0, 0.5); }
.modal-overlay.show .modal { transform: scale(1); }
.modal-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-head h3 { font-size: 13px; font-weight: 600; }
.modal-body { padding: 18px; }
.modal-foot { padding: 10px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 6px; }

.photo-box { width: 80px; height: 80px; border-radius: 50%; border: 2px dashed var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; background: var(--card2); }
.photo-box:hover { border-color: var(--orange); background: rgba(237, 137, 54, 0.05); }
.photo-box img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

.table-responsive { overflow-x: auto; border-radius: 6px; border: 1px solid var(--border); }
.table-responsive table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
.table-responsive th { background: var(--bg2); padding: 8px 10px; text-align: left; font-weight: 600; color: var(--muted); font-size: 9px; text-transform: uppercase; white-space: nowrap; }
.table-responsive td { padding: 8px 10px; border-top: 1px solid var(--border); white-space: nowrap; }
.table-responsive tr:hover td { background: rgba(237, 137, 54, 0.015); }

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
}
</style>
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<div id="modalOverlay" class="modal-overlay" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle"></h3>
      <button onclick="closeModal()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0;width:20px;height:20px;display:flex;align-items:center;justify-content:center;">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <img src="assets/logo.png" alt="Logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<h1 style=\"color:var(--orange);font-size:24px;font-weight:900;text-align:center;\">INFRAMINA</h1>'">
    </div>
    <div class="login-title">Sistema de Controle</div>
    <div class="login-sub">Acesso ao Sistema</div>
    <div class="login-card">
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div>
          <label for="loginUser" style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px;">Usuário</label>
          <input id="loginUser" class="input" placeholder="admin" autocomplete="off">
        </div>
        <div>
          <label for="loginPass" style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px;">Senha</label>
          <div class="password-wrapper">
            <input id="loginPass" type="password" class="input" placeholder="admin" autocomplete="off" style="padding-right:35px;">
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('loginPass', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <button onclick="doLogin()" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:10px;">
          <i class="fas fa-arrow-right-to-bracket"></i>Entrar
        </button>
      </div>
      <div id="loginError" style="background:rgba(229,62,62,0.1);border:1px solid rgba(229,62,62,0.2);color:var(--red);padding:8px 10px;border-radius:6px;font-size:10px;display:none;margin-top:12px;"></div>
    </div>
    <div class="login-link">Não tem conta? <button onclick="openRegisterModal()">Criar Conta</button></div>
    <div style="text-align:center;margin-top:16px;font-size:9px;color:var(--muted);">
      Demo: <strong>admin</strong> / <strong>admin</strong>
    </div>
  </div>
</div>

<!-- APP -->
<div id="mainApp" style="display:none;">
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <img src="assets/logo.png" alt="Logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<h2 style=\"color:var(--orange);font-size:12px;font-weight:900;\">INFRAMINA</h2>'">
    </div>
    <div style="flex:1;padding:6px 0;overflow-y:auto;" id="navList"></div>
    <div class="sb-foot">
      <button class="sb-logout" onclick="doLogout()">
        <i class="fas fa-right-from-bracket"></i>Sair
      </button>
    </div>
  </aside>
  <div class="main-content">
    <div class="top-bar">
      <h1 id="pageTitle">Visão Geral</h1>
      <span class="mono" id="clock" style="font-size:10px;color:var(--muted);">--:--:--</span>
    </div>
    <div id="secOverview" class="section active"></div>
    <div id="secCombois" class="section"></div>
    <div id="secExcel" class="section"></div>
    <div id="secRelatorios" class="section"></div>
    <div id="secSubsolo" class="section"></div>
  </div>
</div>

<script>
const K = { U: 'im_users', R: 'im_roles', S: 'im_session', D: 'im_data' };
let currentUser = null;
let currentSection = 'secOverview';

// ===== STORAGE =====
function getU() {
  const stored = localStorage.getItem(K.U);
  if (stored) return JSON.parse(stored);
  return [{
    id: 'master_0',
    nome: 'Admin',
    username: 'admin',
    password: 'admin',
    email: 'admin@inframina.com',
    whatsapp: '',
    role: 'Administrador',
    status: 'ativo',
    foto: '',
    notificacoes: true,
    criadoEm: new Date().toISOString()
  }];
}

function saveU(u) { localStorage.setItem(K.U, JSON.stringify(u)); }

function getData() {
  const stored = localStorage.getItem(K.D);
  if (stored) return JSON.parse(stored);
  return {
    combois: [
      { id: 'c1', codigo: 'T-101', linha: 'Linha Norte', litros: 1900, descidas: 0, status: 'ativo' },
      { id: 'c2', codigo: 'T-205', linha: 'Linha Sul', litros: 1900, descidas: 0, status: 'ativo' },
      { id: 'c3', codigo: 'T-312', linha: 'Linha Leste', litros: 1900, descidas: 0, status: 'ativo' },
    ],
    subsolo: [
      { id: 's1', nome: 'João Silva', funcao: 'Operador', turno: '1º', status: 'ativo' },
      { id: 's2', nome: 'Maria Santos', funcao: 'Assistente', turno: '2º', status: 'ativo' },
    ],
    relatorios: []
  };
}

function saveData(d) { localStorage.setItem(K.D, JSON.stringify(d)); }

function getSess() {
  const stored = localStorage.getItem(K.S);
  return stored ? JSON.parse(stored) : null;
}

function saveSess(s) { localStorage.setItem(K.S, JSON.stringify(s)); }

// ===== UI =====
function togglePasswordVisibility(inputId, button) {
  const input = document.getElementById(inputId);
  const icon = button.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fas fa-eye';
  }
}

function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  const icons = { success: 'check-circle', error: 'exclamation-circle', info: 'info-circle' };
  const colors = { success: 'var(--green)', error: 'var(--red)', info: 'var(--teal)' };
  el.className = `toast`;
  el.innerHTML = `<i class="fas fa-${icons[type] || 'info-circle'}" style="color:${colors[type]};"></i><span>${msg}</span>`;
  container.appendChild(el);
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, 2800);
}

function openModal(title, body, footer) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFoot').innerHTML = footer || '';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// ===== AUTH =====
function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errorEl = document.getElementById('loginError');
  errorEl.style.display = 'none';
  
  if (!username || !password) {
    errorEl.textContent = '❌ Preencha usuário e senha';
    errorEl.style.display = 'block';
    return;
  }
  
  const users = getU();
  const user = users.find(u => u.username === username);
  
  if (!user) {
    errorEl.textContent = '❌ Usuário não encontrado';
    errorEl.style.display = 'block';
    return;
  }
  
  if (user.password !== password) {
    errorEl.textContent = '❌ Senha incorreta';
    errorEl.style.display = 'block';
    return;
  }
  
  currentUser = user;
  saveSess({ uid: user.id });
  
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  
  buildNav();
  renderOverview();
  startClock();
  toast(`✓ Bem-vindo, ${user.nome}!`, 'success');
}

function doLogout() {
  currentUser = null;
  localStorage.removeItem(K.S);
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginPass').type = 'password';
  toast('Desconectado', 'info');
}

function autoLogin() {
  const sess = getSess();
  if (!sess) return;
  const users = getU();
  const user = users.find(u => u.id === sess.uid);
  if (user && user.status === 'ativo') {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    buildNav();
    renderOverview();
    startClock();
  }
}

// ===== NAV =====
function buildNav() {
  const navList = document.getElementById('navList');
  navList.innerHTML = `
    <div class="nav-item active" onclick="navTo('secOverview')">
      <i class="fas fa-th-large"></i><span>Visão Geral</span>
    </div>
    <div class="nav-item" onclick="navTo('secCombois')">
      <i class="fas fa-train"></i><span>Comboios</span>
    </div>
    <div class="nav-item" onclick="navTo('secSubsolo')">
      <i class="fas fa-hard-hat"></i><span>Subsolo</span>
    </div>
    <div class="nav-item" onclick="navTo('secExcel')">
      <i class="fas fa-file-excel"></i><span>Excel</span>
    </div>
    <div class="nav-item" onclick="navTo('secRelatorios')">
      <i class="fas fa-file-pdf"></i><span>Relatórios</span>
    </div>
  `;
}

function navTo(secId) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(secId).classList.add('active');
  event.currentTarget?.classList.add('active');
  currentSection = secId;
  
  const titles = {
    'secOverview': 'Visão Geral',
    'secCombois': 'Comboios',
    'secSubsolo': 'Equipe Subsolo',
    'secExcel': 'Importar Excel',
    'secRelatorios': 'Relatórios'
  };
  document.getElementById('pageTitle').textContent = titles[secId] || 'InfraMINA';
  
  if (secId === 'secOverview') renderOverview();
  else if (secId === 'secCombois') renderCombois();
  else if (secId === 'secSubsolo') renderSubsolo();
  else if (secId === 'secExcel') renderExcel();
  else if (secId === 'secRelatorios') renderRelatorios();
}

// ===== SCREENS =====
function renderOverview() {
  const data = getData();
  const totalLitros = data.combois.reduce((a, c) => a + (c.litros * c.descidas), 0);
  const html = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;">
      <div class="card">
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;">Total Litros Descidos</div>
        <div style="font-size:24px;font-weight:900;color:var(--orange);">${totalLitros.toLocaleString('pt-BR')}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:4px;">L de óleo lubrificante</div>
      </div>
      <div class="card">
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;">Comboios Ativos</div>
        <div style="font-size:24px;font-weight:900;color:var(--green);">${data.combois.filter(c => c.status === 'ativo').length}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:4px;">de ${data.combois.length} comboios</div>
      </div>
      <div class="card">
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;">Equipe Subsolo</div>
        <div style="font-size:24px;font-weight:900;color:var(--teal);">${data.subsolo.length}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:4px;">operadores atuando</div>
      </div>
    </div>
    <div class="card">
      <h3 style="font-size:13px;font-weight:600;margin-bottom:12px;">Usuário Logado</h3>
      <p style="font-size:12px;margin-bottom:8px;"><strong>Nome:</strong> ${currentUser.nome}</p>
      <p style="font-size:12px;margin-bottom:8px;"><strong>Email:</strong> ${currentUser.email}</p>
      <p style="font-size:12px;"><strong>Cargo:</strong> ${currentUser.role}</p>
    </div>
  `;
  document.getElementById('secOverview').innerHTML = html;
}

function renderCombois() {
  const data = getData();
  const rows = data.combois.map(c => `
    <tr>
      <td style="font-weight:600;">${c.codigo}</td>
      <td>${c.linha}</td>
      <td class="mono">${c.litros}L</td>
      <td class="mono" style="font-weight:600;color:var(--orange);">${c.descidas}</td>
      <td class="mono" style="color:var(--orange);">${(c.litros * c.descidas).toLocaleString('pt-BR')}L</td>
      <td><span class="badge badge-active">${c.status}</span></td>
      <td style="text-align:center;">
        <button class="btn btn-primary btn-sm" onclick="addDescida('${c.id}')"><i class="fas fa-arrow-down"></i>Descer</button>
      </td>
    </tr>
  `).join('');
  
  const html = `
    <div class="card">
      <h3 style="font-size:13px;font-weight:600;margin-bottom:12px;">Controle de Comboios</h3>
      <p style="font-size:10px;color:var(--muted);margin-bottom:12px;">Cada comboio desce com 1900L de óleo lubrificante</p>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Linha</th>
              <th>Cap. Litros</th>
              <th>Descidas</th>
              <th>Total Litros</th>
              <th>Status</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
  document.getElementById('secCombois').innerHTML = html;
}

function addDescida(comboioId) {
  const data = getData();
  const comboio = data.combois.find(c => c.id === comboioId);
  if (comboio) {
    comboio.descidas++;

}

      </div>
      <input type="file" id="excelInput" style="display:none;" accept=".xlsx,.xls,.csv" onchange="importarExcel(this.files[0])">

function importarExcel(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet);
      toast(`✓ ${json.length} linhas importadas com sucesso!`, 'success');
      console.log('Dados importados:', json);
    } catch (err) {
      toast('❌ Erro ao ler arquivo: ' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

    id: 'rel' + Date.now(),
    titulo: 'Relatório de Comboios',
    data: new Date().toLocaleDateString('pt-BR'),
    totalComboios: data.combois.length,
    totalDescidas: data.combois.reduce((a, c) => a + c.descidas, 0),
    totalLitros,
    autor: currentUser.nome
  };
  data.relatorios.push(relatorio);

function exportarPDF() {
  const data = getData();
  const totalLitros = data.combois.reduce((a, c) => a + (c.litros * c.descidas), 0);
  const html = `
    <div style="font-family:Arial;padding:20px;background:#fff;color:#000;">

      <p><strong>Data:</strong> ${new Date().toLocaleDateString('pt-BR')}</p>
      <p><strong>Autor:</strong> ${currentUser.nome}</p>
      <table style="width:100%;border-collapse:collapse;margin-top:20px;">
        <thead>
          <tr style="background:#f0f0f0;">
            <th style="border:1px solid #ccc;padding:8px;">Código</th>
            <th style="border:1px solid #ccc;padding:8px;">Linha</th>
            <th style="border:1px solid #ccc;padding:8px;">Descidas</th>
            <th style="border:1px solid #ccc;padding:8px;">Total Litros</th>
          </tr>
        </thead>
        <tbody>
          ${data.combois.map(c => `
            <tr>
              <td style="border:1px solid #ccc;padding:8px;">${c.codigo}</td>
              <td style="border:1px solid #ccc;padding:8px;">${c.linha}</td>
              <td style="border:1px solid #ccc;padding:8px;">${c.descidas}</td>
              <td style="border:1px solid #ccc;padding:8px;">${(c.litros * c.descidas).toLocaleString('pt-BR')}L</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <h3 style="margin-top:20px;">Total Geral: ${totalLitros.toLocaleString('pt-BR')}L</h3>
    </div>
  `;
  const element = document.createElement('div');

    jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }

let regFotoData = '';
function previewFoto(input) {
  if (!input.files[0]) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    regFotoData = e.target.result;
    document.querySelector('.photo-box').innerHTML = `<img src="${regFotoData}">`;
  };
  reader.readAsDataURL(input.files[0]);
}

function criarConta() {
  const nome = document.getElementById('regNome').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const user = document.getElementById('regUser').value.trim();
  const pass = document.getElementById('regPass').value;
  const whatsapp = document.getElementById('regWhatsapp').value.trim();
  const notif = document.getElementById('regNotif').checked;
  
  if (!nome || !email || !user || !pass) {
    toast('Preencha todos os campos obrigatórios', 'error');
    return;
  }
  
  const users = getU();
  if (users.find(u => u.username === user)) {
    toast('Usuário já existe', 'error');
    return;
  }
  
  const newUser = {
    id: 'u' + Date.now(),
    nome,
    email,
    whatsapp,
    username: user,
    password: pass,
    role: 'Usuário',
    status: 'ativo',
    foto: regFotoData,
    notificacoes: notif,
    criadoEm: new Date().toISOString()
  };
  
  users.push(newUser);
  saveU(users);
  closeModal();
  regFotoData = '';
  toast('✓ Conta criada com sucesso! Faça login', 'success');
}
