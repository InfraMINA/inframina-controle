<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraMINA - Sistema de Controle</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #0e1015;
  --bg2: #151820;
  --card: #1a1e28;
  --card2: #222630;
  --border: #2a2f3a;
  --border2: #363c4a;
  --red: #e53e3e;
  --orange: #ed8936;
  --yellow: #ecc94b;
  --redg: rgba(229, 62, 62, 0.1);
  --orangeg: rgba(237, 137, 54, 0.1);
  --teal: #38b2ac;
  --green: #48bb78;
  --text: #e8ebf0;
  --muted: #5f6577;
  --glass: rgba(26, 30, 40, 0.94);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.mono {
  font-family: 'JetBrains Mono', monospace;
}

/* LOGIN */
.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.login-box {
  width: 100%;
  max-width: 340px;
}

.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
}

.login-title {
  text-align: center;
  margin-bottom: 4px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
}

.login-sub {
  text-align: center;
  margin-bottom: 24px;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--border2);
}

.login-link {
  text-align: center;
  margin-top: 16px;
  font-size: 11px;
  color: var(--muted);
}

.login-link button {
  background: none;
  border: none;
  color: var(--orange);
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
}

.login-link button:hover {
  text-decoration: underline;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  left: 0;
  top: 0;
  bottom: 0;
  width: 230px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  z-index: 50;
  display: flex;
  flex-direction: column;
  transition: transform 0.25s;
}

.sb-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.15s;
  border-left: 3px solid transparent;
  font-size: 12.5px;
  font-weight: 500;
}

.nav-item:hover {
  color: var(--text);
  background: rgba(237, 137, 54, 0.03);
}

.nav-item.active {
  color: var(--orange);
  background: rgba(237, 137, 54, 0.06);
  border-left-color: var(--orange);
}

.nav-badge {
  margin-left: auto;
  background: var(--red);
  color: #fff;
  font-size: 8px;
  font-weight: 700;
  padding: 0 5px;
  border-radius: 8px;
  line-height: 16px;
  min-width: 16px;
  text-align: center;
}

.sb-foot {
  padding: 12px;
  border-top: 1px solid var(--border);
  margin-top: auto;
}

.sb-logout {
  width: 100%;
  padding: 6px 0;
  border: none;
  background: none;
  color: var(--muted);
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border-radius: 6px;
  transition: all 0.15s;
}

.sb-logout:hover {
  background: var(--card);
  color: var(--red);
}

/* MAIN */
.main-content {
  margin-left: 230px;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

.top-bar {
  position: sticky;
  top: 0;
  z-index: 40;
  background: var(--glass);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 10px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.top-bar h1 {
  font-size: 13px;
  font-weight: 700;
}

.top-clock {
  font-size: 10px;
  color: var(--muted);
}

/* COMPONENTS */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}

.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.badge-active {
  background: rgba(72, 187, 120, 0.1);
  color: var(--green);
}

.badge-info {
  background: rgba(56, 178, 172, 0.08);
  color: var(--teal);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  font-family: inherit;
}

.btn-primary {
  background: linear-gradient(135deg, var(--orange), #dd6b20);
  color: #fff;
}

.btn-primary:hover {
  box-shadow: 0 3px 10px rgba(237, 137, 54, 0.2);
}

.btn-secondary {
  background: var(--card2);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover {
  border-color: var(--orange);
  color: var(--orange);
}

.btn-danger {
  background: var(--redg);
  color: var(--red);
  border: 1px solid rgba(229, 62, 62, 0.15);
}

.btn-danger:hover {
  background: rgba(229, 62, 62, 0.18);
}

.input {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 11px;
  color: var(--text);
  font-size: 11.5px;
  font-family: inherit;
  width: 100%;
  transition: border-color 0.15s;
}

.input:focus {
  outline: none;
  border-color: var(--orange);
}

.section {
  display: none;
  padding: 20px 22px;
}

.section.active {
  display: block;
}

/* TOAST */
.toast-container {
  position: fixed;
  top: 14px;
  right: 14px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.toast {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 9px 14px;
  border-radius: 7px;
  background: var(--card);
  border: 1px solid var(--border);
  box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
  transform: translateX(110%);
  transition: transform 0.25s;
  font-size: 11px;
}

.toast.show {
  transform: translateX(0);
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(3px);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

.modal-overlay.show {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: 92%;
  max-width: 480px;
  max-height: 80vh;
  overflow-y: auto;
  transform: scale(0.96);
  transition: transform 0.2s;
}

.modal-overlay.show .modal {
  transform: scale(1);
}

.modal-head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-head h3 {
  font-size: 13px;
  font-weight: 600;
}

.modal-body {
  padding: 18px;
}

.modal-foot {
  padding: 10px 18px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 6px;
}

@media (max-width: 768px) {
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .main-content {
    margin-left: 0;
  }
}
</style>
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<div id="modalOverlay" class="modal-overlay" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle"></h3>
      <button onclick="closeModal()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:28px;">
      <h1 style="font-size:24px;font-weight:900;color:var(--orange);margin-bottom:8px;">INFRAMINA</h1>
    </div>
    <div class="login-title">Sistema de Controle</div>
    <div class="login-sub">Acesso ao Sistema</div>
    <div class="login-card">
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div>
          <label for="loginUser" style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px;">Usuário</label>
          <input id="loginUser" class="input" placeholder="admin" autocomplete="off">
        </div>
        <div>
          <label for="loginPass" style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px;">Senha</label>
          <input id="loginPass" type="password" class="input" placeholder="admin" autocomplete="off">
        </div>
        <button onclick="doLogin()" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:10px;">
          <i class="fas fa-arrow-right-to-bracket"></i>Entrar
        </button>
      </div>
      <div id="loginError" style="background:rgba(229,62,62,0.1);border:1px solid rgba(229,62,62,0.2);color:var(--red);padding:8px 10px;border-radius:6px;font-size:10px;display:none;margin-top:12px;">
      </div>
    </div>
    <div style="text-align:center;margin-top:16px;font-size:9px;color:var(--muted);">
      Demo: <strong>admin</strong> / <strong>admin</strong>
    </div>
  </div>
</div>

<!-- APP -->
<div id="mainApp" style="display:none;">
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <h2 style="font-size:14px;font-weight:900;color:var(--orange);">INFRAMINA</h2>
    </div>
    <div style="flex:1;padding:6px 0;overflow-y:auto;" id="navList"></div>
    <div class="sb-foot">
      <button class="sb-logout" onclick="doLogout()">
        <i class="fas fa-right-from-bracket"></i>Sair
      </button>
    </div>
  </aside>
  <div class="main-content">
    <div class="top-bar">
      <h1 id="pageTitle"></h1>
      <span class="top-clock mono" id="clock">--:--:--</span>
    </div>
    <div id="secOverview" class="section active"></div>
    <div id="secAdmin" class="section"></div>
  </div>
</div>

<script>
const K = { U: 'im_users', R: 'im_roles', S: 'im_session' };

function getU() {
  const stored = localStorage.getItem(K.U);
  if (stored) return JSON.parse(stored);
  return [{
    id: 'master_0',
    nome: 'Admin',
    username: 'admin',
    password: 'admin',
    role: 'admin',
    status: 'ativo'
  }];
}

function saveU(u) {
  localStorage.setItem(K.U, JSON.stringify(u));
}

function getSess() {
  const stored = localStorage.getItem(K.S);
  return stored ? JSON.parse(stored) : null;
}

function saveSess(s) {
  localStorage.setItem(K.S, JSON.stringify(s));
}

function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  const icons = { success: 'check-circle', error: 'exclamation-circle', info: 'info-circle' };
  
  el.className = `toast toast-${type}`;
  el.innerHTML = `<i class="fas fa-${icons[type] || 'info-circle'}" style="color:var(--${type === 'success' ? 'green' : 'red'});"></i><span>${msg}</span>`;
  
  container.appendChild(el);
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, 2800);
}

function openModal(title, body, footer) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFoot').innerHTML = footer || '';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

let currentUser = null;

function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errorEl = document.getElementById('loginError');
  
  errorEl.style.display = 'none';
  
  if (!username || !password) {
    errorEl.textContent = 'Preencha usuário e senha';
    errorEl.style.display = 'block';
    return;
  }
  
  const users = getU();
  const user = users.find(u => u.username === username);
  
  if (!user) {
    errorEl.textContent = 'Usuário não encontrado';
    errorEl.style.display = 'block';
    return;
  }
  
  if (user.password !== password) {
    errorEl.textContent = 'Senha incorreta';
    errorEl.style.display = 'block';
    return;
  }
  
  currentUser = user;
  saveSess({ uid: user.id });
  
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  
  buildNav();
  renderOverview();
  startClock();
  
  toast(`Bem-vindo, ${user.nome}!`, 'success');
}

function doLogout() {
  currentUser = null;
  localStorage.removeItem(K.S);
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  toast('Desconectado', 'info');
}

function autoLogin() {
  const sess = getSess();
  if (!sess) return;
  
  const users = getU();
  const user = users.find(u => u.id === sess.uid);
  
  if (user && user.status === 'ativo') {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    buildNav();
    renderOverview();
    startClock();
  }
}

function buildNav() {
  const navList = document.getElementById('navList');
  navList.innerHTML = `
    <div class="nav-item active" onclick="renderOverview()">
      <i class="fas fa-th-large"></i>
      <span>Visão Geral</span>
    </div>
    <div class="nav-item" onclick="renderAdmin()">
      <i class="fas fa-user-shield"></i>
      <span>Painel Admin</span>
    </div>
  `;
}

function renderOverview() {
  document.getElementById('secOverview').innerHTML = `
    <div style="margin-bottom:24px;">
      <h2 style="font-size:14px;font-weight:700;margin-bottom:14px;">Bem-vindo, ${currentUser.nome}!</h2>
      <div class="card">
        <p style="font-size:12px;color:var(--text);margin-bottom:8px;">
          <strong>Usuário:</strong> ${currentUser.username}
        </p>
        <p style="font-size:12px;color:var(--text);">
          <strong>Cargo:</strong> ${currentUser.role}
        </p>
      </div>
    </div>
  `;
  document.getElementById('secAdmin').style.display = 'none';
  document.getElementById('secOverview').style.display = 'block';
  document.getElementById('pageTitle').textContent = 'Visão Geral';
}

function renderAdmin() {
  const users = getU();
  const usersList = users.map(u => `
    <div class="card" style="margin-bottom:8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <p style="font-weight:600;font-size:12px;margin-bottom:4px;">${u.nome}</p>
          <p style="font-size:10px;color:var(--muted);">@${u.username}</p>
        </div>
        <span class="badge badge-active">${u.status}</span>
      </div>
    </div>
  `).join('');
  
  document.getElementById('secAdmin').innerHTML = `
    <div style="margin-bottom:24px;">
      <h2 style="font-size:14px;font-weight:700;margin-bottom:14px;">Painel Admin</h2>
      <div>${usersList}</div>
    </div>
  `;
  document.getElementById('secOverview').style.display = 'none';
  document.getElementById('secAdmin').style.display = 'block';
  document.getElementById('pageTitle').textContent = 'Painel Admin';
}

function startClock() {
  function update() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleTimeString('pt-BR');
  }
  update();
  setInterval(update, 1000);
}

// Event listeners
document.getElementById('loginPass').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') doLogin();
});

document.getElementById('loginUser').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    document.getElementById('loginPass').focus();
  }
});

// Init
autoLogin();
</script>

</body>
</html>
