<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraMINA - Controle de Abastecimento</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #0e1015;
  --bg2: #151820;
  --card: #1a1e28;
  --card2: #222630;
  --border: #2a2f3a;
  --border2: #363c4a;
  --red: #e53e3e;
  --orange: #ed8936;
  --yellow: #ecc94b;
  --teal: #38b2ac;
  --green: #48bb78;
  --text: #e8ebf0;
  --muted: #5f6577;
  --glass: rgba(26, 30, 40, 0.94);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.mono { font-family: 'JetBrains Mono', monospace; }

.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-box { width: 100%; max-width: 380px; }
.login-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
.login-title { text-align: center; margin-bottom: 4px; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.login-sub { text-align: center; margin-bottom: 24px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--border2); }
.login-link { text-align: center; margin-top: 16px; font-size: 11px; color: var(--muted); }
.login-link button { background: none; border: none; color: var(--orange); font-weight: 600; cursor: pointer; font-family: inherit; font-size: 11px; }

.sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 230px; background: var(--bg2); border-right: 1px solid var(--border); z-index: 50; display: flex; flex-direction: column; transition: transform 0.25s; }
.sb-head { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; cursor: pointer; color: var(--muted); transition: all 0.15s; border-left: 3px solid transparent; font-size: 12.5px; font-weight: 500; }
.nav-item:hover { color: var(--text); background: rgba(237, 137, 54, 0.03); }
.nav-item.active { color: var(--orange); background: rgba(237, 137, 54, 0.06); border-left-color: var(--orange); }
.sb-foot { padding: 12px; border-top: 1px solid var(--border); margin-top: auto; }
.sb-logout { width: 100%; padding: 6px 0; border: none; background: none; color: var(--muted); font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; border-radius: 6px; transition: all 0.15s; }
.sb-logout:hover { background: var(--card); color: var(--red); }

.main-content { margin-left: 230px; min-height: 100vh; }
.top-bar { position: sticky; top: 0; z-index: 40; background: var(--glass); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 12px 22px; display: flex; align-items: center; justify-content: space-between; }
.top-bar h1 { font-size: 13px; font-weight: 700; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
.badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 10px; font-size: 9px; font-weight: 700; text-transform: uppercase; }
.badge-active { background: rgba(72, 187, 120, 0.1); color: var(--green); }
.badge-empty { background: rgba(229, 62, 62, 0.1); color: var(--red); }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
.btn-primary { background: linear-gradient(135deg, var(--orange), #dd6b20); color: #fff; }
.btn-primary:hover { box-shadow: 0 3px 10px rgba(237, 137, 54, 0.2); }
.btn-secondary { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--orange); }
.btn-danger { background: rgba(229, 62, 62, 0.1); color: var(--red); border: 1px solid rgba(229, 62, 62, 0.2); }
.btn-danger:hover { background: rgba(229, 62, 62, 0.2); }
.btn-sm { padding: 4px 9px; font-size: 10px; }

.input { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 11px; color: var(--text); font-size: 11.5px; width: 100%; transition: border-color 0.15s; }
.input:focus { outline: none; border-color: var(--orange); box-shadow: 0 0 0 2px rgba(237, 137, 54, 0.1); }
select.input { cursor: pointer; }

.section { display: none; padding: 20px 22px; }
.section.active { display: block; }

.password-wrapper { position: relative; }
.password-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; padding: 5px; font-size: 12px; }
.password-toggle:hover { color: var(--orange); }

.toast-container { position: fixed; top: 14px; right: 14px; z-index: 9999; display: flex; flex-direction: column; gap: 5px; }
.toast { display: flex; align-items: center; gap: 7px; padding: 9px 14px; border-radius: 7px; background: var(--card); border: 1px solid var(--border); transform: translateX(110%); transition: transform 0.25s; font-size: 11px; }
.toast.show { transform: translateX(0); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(3px); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.show { opacity: 1; pointer-events: all; }
.modal { background: var(--card); border: 1px solid var(--border); border-radius: 10px; width: 92%; max-width: 500px; max-height: 80vh; overflow-y: auto; transform: scale(0.96); transition: transform 0.2s; }
.modal-overlay.show .modal { transform: scale(1); }
.modal-head { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-head h3 { font-size: 13px; font-weight: 600; }
.modal-body { padding: 18px; }
.modal-foot { padding: 10px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 6px; }

.table-responsive { overflow-x: auto; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 12px; }
.table-responsive table { width: 100%; border-collapse: collapse; font-size: 11px; }
.table-responsive th { background: var(--bg2); padding: 10px; text-align: left; font-weight: 600; color: var(--muted); font-size: 9px; text-transform: uppercase; }
.table-responsive td { padding: 10px; border-top: 1px solid var(--border); }
.table-responsive tr:hover td { background: rgba(237, 137, 54, 0.015); }

.stat-box { background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; text-align: center; }
.stat-value { font-size: 24px; font-weight: 900; color: var(--orange); margin-bottom: 4px; }
.stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; }

.fiscal-group { background: var(--card2); border-left: 3px solid var(--orange); border-radius: 6px; padding: 12px; margin-bottom: 12px; cursor: pointer; transition: all 0.15s; }
.fiscal-group:hover { background: rgba(237, 137, 54, 0.05); }
.fiscal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0; }
.fiscal-name { font-weight: 600; font-size: 12px; color: var(--orange); }
.operators-list { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
.operators-list.show { display: block; }
.operator-item { font-size: 11px; color: var(--text); padding: 6px 0; padding-left: 20px; border-bottom: 1px solid rgba(94, 101, 119, 0.3); }
.operator-item:last-child { border-bottom: none; }

.empty-state { text-align: center; padding: 40px 20px; }
.empty-state i { font-size: 48px; color: var(--muted); margin-bottom: 12px; display: block; opacity: 0.5; }
.empty-state p { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.empty-state a { color: var(--orange); font-weight: 600; text-decoration: none; cursor: pointer; }

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .main-content { margin-left: 0; }
}
</style>
</head>
<body>

<div id="toastContainer" class="toast-container"></div>

<div id="modalOverlay" class="modal-overlay" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle"></h3>
      <button onclick="closeModal()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0;">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:28px;">
      <svg width="70" height="70" viewBox="0 0 60 60" fill="none" style="margin:0 auto;display:block;">
        <rect width="60" height="60" rx="8" fill="#ed8936"/>
        <text x="30" y="40" font-size="32" font-weight="900" fill="white" text-anchor="middle" font-family="Arial">IM</text>
      </svg>
    </div>
    <div class="login-title">Controle de Abastecimento</div>
    <div class="login-sub">InfraMINA</div>
    <div class="login-card">
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div>
          <label for="loginUser" style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px;">Usuário</label>
          <input id="loginUser" class="input" placeholder="">
        </div>
        <div>
          <label for="loginPass" style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:5px;">Senha</label>
          <div class="password-wrapper">
            <input id="loginPass" type="password" class="input" placeholder="" style="padding-right:35px;">
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('loginPass', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <button onclick="doLogin()" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:10px;">
          <i class="fas fa-arrow-right-to-bracket"></i>Entrar
        </button>
      </div>
      <div id="loginError" style="background:rgba(229,62,62,0.1);border:1px solid rgba(229,62,62,0.2);color:var(--red);padding:8px 10px;border-radius:6px;font-size:10px;display:none;margin-top:12px;"></div>
    </div>
    <div class="login-link">Não tem conta? <button onclick="openRegisterModal()">Criar Conta</button></div>
  </div>
</div>

<!-- APP -->
<div id="mainApp" style="display:none;">
  <aside class="sidebar" id="sidebar">
    <div class="sb-head">
      <svg width="24" height="24" viewBox="0 0 60 60" fill="none">
        <rect width="60" height="60" rx="8" fill="#ed8936"/>
        <text x="30" y="38" font-size="28" font-weight="900" fill="white" text-anchor="middle" font-family="Arial">IM</text>
      </svg>
      <span style="font-weight:900;color:var(--orange);font-size:11px;">INFRAMINA</span>
    </div>
    <div style="flex:1;padding:6px 0;overflow-y:auto;" id="navList"></div>
    <div class="sb-foot">
      <button class="sb-logout" onclick="doLogout()">
        <i class="fas fa-right-from-bracket"></i>Sair
      </button>
    </div>
  </aside>
  <div class="main-content">
    <div class="top-bar">
      <h1 id="pageTitle">Dashboard</h1>
      <span class="mono" id="clock" style="font-size:10px;color:var(--muted);">--:--:--</span>
    </div>
    <div id="secDashboard" class="section active"></div>
    <div id="secCombois" class="section"></div>
    <div id="secSubsolo" class="section"></div>
    <div id="secExcel" class="section"></div>
    <div id="secRelatorios" class="section"></div>
  </div>
</div>

<script>
const K = { U: 'im_users', S: 'im_session', D: 'im_data' };
let currentUser = null;
let excelData = null;
let excelMapeamento = {};

// ===== STORAGE =====
function getU() {
  const stored = localStorage.getItem(K.U);
  if (stored) return JSON.parse(stored);
  return [];
}

function saveU(u) { localStorage.setItem(K.U, JSON.stringify(u)); }

function getData() {
  const stored = localStorage.getItem(K.D);
  if (stored) return JSON.parse(stored);
  return {
    combois: [],
    subsolo: []
  };
}

function saveData(d) { localStorage.setItem(K.D, JSON.stringify(d)); }

function getSess() {
  const stored = localStorage.getItem(K.S);
  return stored ? JSON.parse(stored) : null;
}

function saveSess(s) { localStorage.setItem(K.S, JSON.stringify(s)); }

// ===== UI =====
function togglePasswordVisibility(inputId, button) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    button.querySelector('i').className = 'fas fa-eye-slash';
  } else {
    input.type = 'password';
    button.querySelector('i').className = 'fas fa-eye';
  }
}

function toast(msg, type = 'info') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  const icons = { success: 'check-circle', error: 'exclamation-circle', info: 'info-circle' };
  const colors = { success: 'var(--green)', error: 'var(--red)', info: 'var(--teal)' };
  el.className = `toast`;
  el.innerHTML = `<i class="fas fa-${icons[type]}" style="color:${colors[type]};"></i><span>${msg}</span>`;
  container.appendChild(el);
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => el.remove(), 250);
  }, 2800);
}

function openModal(title, body, footer) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFoot').innerHTML = footer || '';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// ===== AUTH =====
function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errorEl = document.getElementById('loginError');
  errorEl.style.display = 'none';
  
  if (!username || !password) {
    errorEl.textContent = '❌ Preencha usuário e senha';
    errorEl.style.display = 'block';
    return;
  }
  
  const users = getU();
  const user = users.find(u => u.username === username);
  
  if (!user) {
    errorEl.textContent = '❌ Usuário não encontrado';
    errorEl.style.display = 'block';
    return;
  }
  
  if (user.password !== password) {
    errorEl.textContent = '❌ Senha incorreta';
    errorEl.style.display = 'block';
    return;
  }
  
  if (user.status !== 'ativo') {
    errorEl.textContent = '❌ Conta inativa';
    errorEl.style.display = 'block';
    return;
  }
  
  currentUser = user;
  saveSess({ uid: user.id });
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  buildNav();
  renderDashboard();
  startClock();
  toast(`✓ Bem-vindo, ${user.nome}!`, 'success');
}

function doLogout() {
  currentUser = null;
  localStorage.removeItem(K.S);
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginPass').type = 'password';
  toast('Desconectado', 'info');
}

function autoLogin() {
  const sess = getSess();
  if (!sess) return;
  const users = getU();
  const user = users.find(u => u.id === sess.uid);
  if (user && user.status === 'ativo') {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    buildNav();
    renderDashboard();
    startClock();
  }
}

// ===== NAV =====
function buildNav() {
  const navList = document.getElementById('navList');
  navList.innerHTML = `
    <div class="nav-item active" onclick="navTo('secDashboard')">
      <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
    </div>
    <div class="nav-item" onclick="navTo('secCombois')">
      <i class="fas fa-gas-pump"></i><span>Comboios</span>
    </div>
    <div class="nav-item" onclick="navTo('secSubsolo')">
      <i class="fas fa-users-rectangle"></i><span>Equipe</span>
    </div>
    <div class="nav-item" onclick="navTo('secExcel')">
      <i class="fas fa-file-excel"></i><span>Importar</span>
    </div>
    <div class="nav-item" onclick="navTo('secRelatorios')">
      <i class="fas fa-chart-bar"></i><span>Relatórios</span>
    </div>
  `;
}

function navTo(secId) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById(secId).classList.add('active');
  event.currentTarget?.classList.add('active');
  
  const titles = {
    'secDashboard': 'Dashboard Operacional',
    'secCombois': 'Comboios de Abastecimento',
    'secSubsolo': 'Equipe de Subsolo',
    'secExcel': 'Importar Dados',
    'secRelatorios': 'Relatórios'
  };
  document.getElementById('pageTitle').textContent = titles[secId];
  
  if (secId === 'secDashboard') renderDashboard();
  else if (secId === 'secCombois') renderCombois();
  else if (secId === 'secSubsolo') renderSubsolo();
  else if (secId === 'secExcel') renderExcel();
  else if (secId === 'secRelatorios') renderRelatorios();
}

// ===== SCREENS =====
function renderDashboard() {
  const data = getData();
  const now = new Date();
  const hora = now.getHours();
  let turnoAtual = 1;
  if (hora >= 14) turnoAtual = 2;
  if (hora >= 22 || hora < 6) turnoAtual = 3;
  
  const fiscaisTurno = data.subsolo.filter(e => e.funcao === 'Fiscal' && e.turno === turnoAtual && e.status === 'ativo');
  const operadoresTorno = data.subsolo.filter(e => e.funcao === 'Operador' && e.turno === turnoAtual && e.status === 'ativo');
  const comboisAtivos = data.combois.filter(c => c.status === 'ativo').length;
  const totalAbastecimentos = data.combois.reduce((a, c) => a + (c.abastecimentos || 0), 0);
  const totalLitros = totalAbastecimentos * 1900;
  
  const html = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px;">
      <div class="stat-box">
        <div class="stat-value">${comboisAtivos}</div>
        <div class="stat-label">Comboios Ativos</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${fiscaisTurno.length}</div>
        <div class="stat-label">Fiscais (${turnoAtual}º Turno)</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${operadoresTorno.length}</div>
        <div class="stat-label">Operadores (${turnoAtual}º Turno)</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${totalAbastecimentos}</div>
        <div class="stat-label">Total Abastecimentos</div>
      </div>
      <div class="stat-box">
        <div class="stat-value">${(totalLitros/1000).toFixed(1)}k</div>
        <div class="stat-label">Litros Distribuídos</div>
      </div>
    </div>

    <div class="card">
      <h3 style="font-size:13px;font-weight:600;margin-bottom:12px;">💧 Resumo Operacional</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div style="background:var(--card2);border-left:3px solid var(--orange);border-radius:6px;padding:12px;">
          <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">CAPACIDADE POR COMBOIO</div>
          <div style="font-size:18px;font-weight:900;color:var(--orange);">1900<span style="font-size:12px;">L</span></div>
        </div>
        <div style="background:var(--card2);border-left:3px solid var(--green);border-radius:6px;padding:12px;">
          <div style="font-size:10px;color:var(--muted);margin-bottom:4px;">TOTAL DISTRIBUÍDO</div>
          <div style="font-size:18px;font-weight:900;color:var(--green);">${totalLitros.toLocaleString('pt-BR')}<span style="font-size:12px;">L</span></div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('secDashboard').innerHTML = html;
}

function renderCombois() {
  const data = getData();
  
  if (data.combois.length === 0) {
    const html = `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
          <h3 style="font-size:13px;font-weight:600;">Comboios de Abastecimento</h3>
          <button class="btn btn-primary btn-sm" onclick="novoComboio()"><i class="fas fa-plus"></i>Novo</button>
        </div>
        <div class="empty-state">
          <i class="fas fa-gas-pump"></i>
          <p>Nenhum comboio cadastrado</p>
          <a onclick="novoComboio()">Cadastre um novo comboio</a>
        </div>
      </div>
    `;
    document.getElementById('secCombois').innerHTML = html;
    return;
  }
  
  const rows = data.combois.map(c => `
    <tr>
      <td style="font-weight:600;">${c.codigo}</td>
      <td style="text-align:center;">1900L</td>
      <td style="text-align:center;font-weight:600;color:var(--yellow);">${c.abastecimentos || 0}</td>
      <td style="text-align:center;color:var(--orange);">${((c.abastecimentos || 0) * 1900).toLocaleString('pt-BR')}L</td>
      <td style="text-align:center;"><span class="badge badge-active">${c.status}</span></td>
      <td style="text-align:center;display:flex;gap:4px;justify-content:center;">
        <button class="btn btn-primary btn-sm" onclick="registrarAbastecimento('${c.id}')"><i class="fas fa-plus"></i></button>
        <button class="btn btn-danger btn-sm" onclick="deletarComboio('${c.id}')"><i class="fas fa-trash"></i></button>
      </td>
    </tr>
  `).join('');
  
  const html = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="font-size:13px;font-weight:600;">Comboios de Abastecimento</h3>
        <button class="btn btn-primary btn-sm" onclick="novoComboio()"><i class="fas fa-plus"></i>Novo</button>
      </div>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Capacidade</th>
              <th>Abastecimentos</th>
              <th>Total Litros</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
  document.getElementById('secCombois').innerHTML = html;
}

function novoComboio() {
  openModal('Novo Comboio de Abastecimento', `
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div>
        <label style="font-size:9px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:5px;">Código Identificador (ex: AB-001)</label>
        <input id="combCodigo" class="input" placeholder="">
      </div>
    </div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-primary" onclick="salvarComboio()">Criar</button>
  `);
}

function salvarComboio() {
  const codigo = document.getElementById('combCodigo').value.trim();
  
  if (!codigo) {
    toast('Preencha o código do comboio', 'error');
    return;
  }
  
  const data = getData();
  data.combois.push({
    id: 'c' + Date.now(),
    codigo,
    abastecimentos: 0,
    status: 'ativo',
    criadoEm: new Date().toISOString()
  });
  saveData(data);
  closeModal();
  toast('✓ Comboio cadastrado', 'success');
  renderCombois();
  renderDashboard();
}

function registrarAbastecimento(comboioId) {
  const data = getData();
  const c = data.combois.find(x => x.id === comboioId);
  if (c) {
    c.abastecimentos = (c.abastecimentos || 0) + 1;
    saveData(data);
    toast(`✓ Abastecimento registrado! Total: ${(c.abastecimentos * 1900).toLocaleString('pt-BR')}L`, 'success');
    renderCombois();
    renderDashboard();
  }
}

function deletarComboio(comboioId) {
  openModal('Confirmar Exclusão', `
    <p style="font-size:11px;color:var(--muted);">Tem certeza que deseja remover este comboio? Esta ação não pode ser desfeita.</p>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-danger" onclick="confirmarDelComboio('${comboioId}')">Remover</button>
  `);
}

function confirmarDelComboio(id) {
  const data = getData();
  data.combois = data.combois.filter(c => c.id !== id);
  saveData(data);
  closeModal();
  toast('✓ Comboio removido', 'success');
  renderCombois();
  renderDashboard();
}

function renderSubsolo() {
  const data = getData();
  const fiscais = data.subsolo.filter(e => e.funcao === 'Fiscal');
  
  if (fiscais.length === 0) {
    const html = `
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">

          <button class="btn btn-primary btn-sm" onclick="novoMembro()"><i class="fas fa-plus"></i>Novo</button>
        </div>
        <div class="empty-state">
          <i class="fas fa-users"></i>
          <p>Nenhum membro cadastrado</p>
          <a onclick="novoMembro()">Cadastre um fiscal ou operador</a>
        </div>
      </div>
    `;
    document.getElementById('secSubsolo').innerHTML = html;
    return;
  }
  
  const html = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <h3 style="font-size:13px;font-weight:600;">Equipe de Subsolo</h3>
        <button class="btn btn-primary btn-sm" onclick="novoMembro()"><i class="fas fa-plus"></i>Novo</button>
      </div>
      
      ${fiscais.map(f => {
        const ops = data.subsolo.filter(e => e.fisicalId === f.id && e.funcao === 'Operador');
        return `
          <div class="fiscal-group" onclick="toggleOperadores(this)">
            <div class="fiscal-header">
              <div class="fiscal-name">👨‍💼 ${f.nome}</div>
              <div style="display:flex;gap:8px;align-items:center;">
                <span style="font-size:9px;color:var(--muted);">${ops.length} operador(es) | ${f.turno}º turno</span>
                <span class="badge badge-active">${f.status}</span>
                <i class="fas fa-chevron-down" style="font-size:10px;color:var(--muted);transition:transform 0.2s;"></i>
                <button class="btn btn-danger btn-sm" onclick="deletarMembro(event, '${f.id}')"><i class="fas fa-trash"></i></button>
              </div>
            </div>
            <div class="operators-list">
              ${ops.length > 0 ? ops.map(op => `
                <div class="operator-item" style="display:flex;justify-content:space-between;">
                  <span>👤 ${op.nome}</span>
                  <button class="btn btn-danger btn-sm" onclick="deletarMembro(event, '${op.id}')"><i class="fas fa-trash" style="font-size:10px;"></i></button>

              `).join('') : '<div style="padding:6px 20px;color:var(--muted);font-size:10px;">Nenhum operador vinculado</div>'}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
  document.getElementById('secSubsolo').innerHTML = html;
}

function toggleOperadores(element) {
  const list = element.querySelector('.operators-list');
  const icon = element.querySelector('i.fa-chevron-down');
  list.classList.toggle('show');
  icon.style.transform = list.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0)';
}

function updateFiscalSelect() {
  const funcao = document.getElementById('memFuncao').value;
  const div = document.getElementById('fiscalSelectDiv');
  div.style.display = funcao === 'Operador' ? 'block' : 'none';
}

function salvarMembro() {
  const nome = document.getElementById('memNome').value.trim();
  const funcao = document.getElementById('memFuncao').value;
  const turno = document.getElementById('memTurno').value;
  
  if (!nome) {
    toast('Preencha o nome', 'error');
    return;
  }
  
  const data = getData();
  const novo = {
    id: (funcao === 'Fiscal' ? 'f' : 'op') + Date.now(),
    nome,
    funcao,
    turno: parseInt(turno),
    status: 'ativo',
    criadoEm: new Date().toISOString()
  };
  
  if (funcao === 'Operador') {
    novo.fisicalId = document.getElementById('memFiscal').value;
  }

  saveData(data);
  closeModal();
  toast('✓ Membro adicionado à equipe', 'success');
  renderSubsolo();
  renderDashboard();
}

function deletarMembro(event, id) {
  event.stopPropagation();
  openModal('Confirmar Exclusão', `
    <p style="font-size:11px;color:var(--muted);">Deseja remover este membro da equipe?</p>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
    <button class="btn btn-danger" onclick="confirmarDelMembro('${id}')">Remover</button>
  `);
}

function confirmarDelMembro(id) {
  const data = getData();
  data.subsolo = data.subsolo.filter(m => m.id !== id);

  closeModal();
  toast('✓ Membro removido', 'success');

function renderExcel() {
  const html = `
    <div class="card">
      <h3 style="font-size:13px;font-weight:600;margin-bottom:16px;">📊 Importar Dados via Excel</h3>
      <div style="border:2px dashed var(--border);border-radius:8px;padding:40px;text-align:center;cursor:pointer;" onclick="document.getElementById('excelInput').click()">
        <i class="fas fa-file-excel" style="font-size:48px;color:var(--orange);margin-bottom:12px;display:block;"></i>
        <p style="font-size:12px;font-weight:600;margin-bottom:8px;">Clique ou arraste um arquivo</p>
        <p style="font-size:10px;color:var(--muted);">Formatos: .xlsx, .xls, .csv</p>
        <p style="font-size:10px;color:var(--muted);margin-top:12px;">Colunas esperadas: Nome, Função (Fiscal/Operador), Turno, Código Comboio</p>
      </div>
      <input type="file" id="excelInput" style="display:none;" accept=".xlsx,.xls,.csv" onchange="importarExcel(this.files[0])">
      <div id="excelResult" style="margin-top:12px;"></div>
    </div>
  `;
  document.getElementById('secExcel').innerHTML = html;
}

function importarExcel(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(sheet);
      
      if (!json || json.length === 0) {
        toast('❌ Arquivo vazio', 'error');
        return;
      }
      
      excelData = json;
      mostrarMapeamento(Object.keys(json[0]));
    } catch (err) {
      toast('❌ Erro: ' + err.message, 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

function mostrarMapeamento(colunas) {
  const resultDiv = document.getElementById('excelResult');
  
  let html = `
    <div style="background:rgba(237,137,54,0.1);border:1px solid rgba(237,137,54,0.2);border-radius:6px;padding:12px;margin-bottom:12px;">
      <h4 style="font-size:11px;font-weight:600;margin-bottom:8px;">Mapeamento de Colunas</h4>
      <div style="display:grid;gap:8px;">
  `;
  
  for (const col of colunas) {
    const tipos = ['Nome', 'Função', 'Turno', 'Código Comboio', 'Ignorar'];
    html += `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:center;">
        <span style="font-size:11px;font-weight:500;">${col}</span>
        <select class="input" style="padding:6px;" data-col="${col}" onchange="atualizarMapeamento(this)">
          ${tipos.map(t => `<option value="${t}">${t}</option>`).join('')}
        </select>
      </div>
    `;
  }
  
  html += `
      </div>
    </div>
    
    <div style="margin-bottom:12px;">
      <h4 style="font-size:11px;font-weight:600;margin-bottom:8px;">Pré-visualização</h4>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              ${colunas.map(c => `<th>${c}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${excelData.slice(0, 5).map(row => `
              <tr>
                ${colunas.map(c => `<td style="font-size:10px;">${row[c] || '-'}</td>`).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
    
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" onclick="renderExcel()">Cancelar</button>
      <button class="btn btn-primary" onclick="importarDados()">Importar ${excelData.length} Linhas</button>
    </div>
  `;
  
  resultDiv.innerHTML = html;
}

function atualizarMapeamento(select) {
  excelMapeamento[select.dataset.col] = select.value;
}

function importarDados() {
  const data = getData();
  let sucessos = 0, erros = 0;
  
  for (const row of excelData) {
    const nome = Object.entries(excelMapeamento).find(([_, v]) => v === 'Nome')?.[0];
    const funcao = Object.entries(excelMapeamento).find(([_, v]) => v === 'Função')?.[0];
    const turno = Object.entries(excelMapeamento).find(([_, v]) => v === 'Turno')?.[0];
    const codigo = Object.entries(excelMapeamento).find(([_, v]) => v === 'Código Comboio')?.[0];
    
    try {
      if (funcao && row[funcao]) {
        const novo = {
          id: (row[funcao] === 'Fiscal' ? 'f' : 'op') + Date.now() + Math.random(),
          nome: row[nome] || 'Sem Nome',
          funcao: row[funcao],
          turno: parseInt(row[turno]) || 1,
          status: 'ativo'
        };
        if (novo.funcao === 'Operador') novo.fisicalId = data.subsolo.find(f => f.funcao === 'Fiscal')?.id;
        data.subsolo.push(novo);
        sucessos++;
      } else if (codigo && row[codigo]) {
        data.combois.push({
          id: 'c' + Date.now() + Math.random(),
          codigo: row[codigo],
          abastecimentos: 0,
          status: 'ativo'
        });
        sucessos++;
      }
    } catch (err) {
      erros++;
    }
  }
  
  saveData(data);
  document.getElementById('excelResult').innerHTML = `
    <div style="background:rgba(72,187,120,0.1);border:1px solid rgba(72,187,120,0.2);border-radius:6px;padding:12px;">
      <i class="fas fa-check-circle" style="color:var(--green);margin-right:6px;"></i>
      <strong>Importação concluída!</strong><br>
      ✓ ${sucessos} itens inseridos | ✗ ${erros} erros
    </div>
  `;
  toast(`✓ ${sucessos} linhas importadas!`, 'success');
}

function enviarWhatsApp() {
  const data = getData();
  const totalLitros = data.combois.reduce((a, c) => a + ((c.abastecimentos || 0) * 1900), 0);
  const msg = `📊 *Relatório InfraMINA*\n\n💧 Litros: ${totalLitros.toLocaleString('pt-BR')}L\n🚛 Comboios: ${data.combois.length}\n👥 Equipe: ${data.subsolo.length}\n\n${new Date().toLocaleDateString('pt-BR')} ${new Date().toLocaleTimeString('pt-BR')}`;

      <div>
        <label style="font-size:9px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:5px;">Senha</label>

function criarConta() {
  const nome = document.getElementById('regNome').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const user = document.getElementById('regUser').value.trim();
  const pass = document.getElementById('regPass').value;
  
  if (!nome || !email || !user || !pass) {
    toast('Preencha todos os campos', 'error');
    return;
  }
  
  const users = getU();
  if (users.find(u => u.username === user)) {
    toast('Usuário já existe', 'error');
    return;
  }
  
  users.push({
    id: 'u' + Date.now(),
    nome,
    email,
    username: user,
    password: pass,
    role: 'Usuário',
    status: 'ativo',
    criadoEm: new Date().toISOString()
  });
  
  saveU(users);
  closeModal();
  toast('✓ Conta criada! Faça login', 'success');
  document.getElementById('loginUser').value = user;
  document.getElementById('loginPass').value = '';
}

function startClock() {
  function update() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-BR');
  }
  update();
  setInterval(update, 1000);
}

document.getElementById('loginUser').addEventListener('keypress', e => {

});
